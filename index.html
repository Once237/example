<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        #info-label {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            font-family: sans-serif;
            font-size: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        #info-label.visible { opacity: 1; }

        #hint {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-family: sans-serif;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 15px;
            z-index: 100;
        }
    </style>
</head>

<body>
    <div id="hint">👆 点击弹跳 | 👆👆 双击重置 | 📌 长按看信息</div>
    <div id="info-label"></div>

    <a-scene
        mindar-image="imageTargetSrc: ./targets.mind;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera
            position="0 0 0"
            look-controls="enabled: false">
        </a-camera>

        <!-- 图片1 -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model
                id="model-0"
                data-info="📚 图书馆模型"
                src="library.glb"
                position="0 0 0"
                rotation="90 0 0"
                scale="0.005 0.005 0.005">
            </a-gltf-model>
        </a-entity>

        <!-- 图片2 -->
        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model
                id="model-1"
                data-info="🗿 绿色头像"
                src="head-green.glb"
                position="0 0 0"
                scale="0.1 0.1 0.1">
            </a-gltf-model>
        </a-entity>

        <!-- 图片3 -->
        <a-entity mindar-image-target="targetIndex: 2">
            <a-gltf-model
                id="model-2"
                data-info="📦 盒子模型"
                src="box.glb"
                position="0 0 0"
                scale="0.1 0.1 0.1">
            </a-gltf-model>
        </a-entity>

        <!-- 图片4 -->
        <a-entity mindar-image-target="targetIndex: 3">
            <a-gltf-model
                id="model-3"
                data-info="⚽ 球体模型"
                src="ball.glb"
                position="0 0 0"
                scale="0.1 0.1 0.1">
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        (function () {
            const sceneEl = document.querySelector('a-scene');
            const labelEl = document.getElementById('info-label');

            // 模型数据
            const models = {};
            const modelStates = {};   // 每个模型的交互状态
            let activeModel = null;   // 当前被追踪到的模型

            // ---- 场景就绪后收集所有模型引用 ----
            sceneEl.addEventListener('loaded', function () {
                for (let i = 0; i < 4; i++) {
                    const el = document.getElementById('model-' + i);
                    if (!el) continue;
                    models[i] = el;
                    modelStates[i] = {
                        info: el.getAttribute('data-info') || ('模型 ' + i),
                        origScale: el.getAttribute('scale').clone(),
                        clickCount: 0,
                        clickTimer: null,
                        longPressTimer: null,
                        bounceTimer: null,
                        visible: false
                    };
                }

                // ---- 监听每个目标图的出现/消失 ----
                for (let i = 0; i < 4; i++) {
                    const targetEl = document.querySelector('[mindar-image-target="targetIndex: ' + i + '"]');
                    if (targetEl) {
                        targetEl.addEventListener('targetFound', function () {
                            modelStates[i].visible = true;
                            activeModel = i;
                        });
                        targetEl.addEventListener('targetLost', function () {
                            modelStates[i].visible = false;
                            if (activeModel === i) activeModel = null;
                            labelEl.classList.remove('visible');
                        });
                    }
                }
            });

            // ---- 核心: 屏幕坐标 → 射线检测 → 找到命中的模型 ----
            function getModelAtScreen(x, y) {
                const camera = sceneEl.camera;
                if (!camera) return null;

                // 归一化设备坐标
                const rect = sceneEl.canvas.getBoundingClientRect();
                const ndcX = ((x - rect.left) / rect.width)  * 2 - 1;
                const ndcY = -((y - rect.top)  / rect.height) * 2 + 1;

                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);

                // 收集所有模型的三维对象
                const targets = [];
                for (let i = 0; i < 4; i++) {
                    if (models[i] && modelStates[i].visible && models[i].object3D) {
                        targets.push(models[i].object3D);
                    }
                }
                const intersects = raycaster.intersectObjects(targets, true);
                if (intersects.length === 0) return null;

                // 追溯到顶层模型元素
                let obj = intersects[0].object;
                while (obj) {
                    for (let i = 0; i < 4; i++) {
                        if (models[i] && obj === models[i].object3D) return i;
                    }
                    obj = obj.parent;
                }
                return null;
            }

            // ---- 点击/触摸 事件处理 ----
            function handlePointerDown(e) {
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                const idx = getModelAtScreen(x, y);
                if (idx === null) return;

                const st = modelStates[idx];
                // 启动长按计时器
                clearTimeout(st.longPressTimer);
                st.longPressTimer = setTimeout(function () {
                    showInfo(idx);
                }, 800);
            }

            function handlePointerUp(e) {
                const x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                const y = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
                const idx = getModelAtScreen(x, y);

                for (let i = 0; i < 4; i++) {
                    clearTimeout(modelStates[i].longPressTimer);
                }

                if (idx === null) {
                    labelEl.classList.remove('visible');
                    return;
                }

                // 单击/双击判断
                const st = modelStates[idx];
                st.clickCount++;
                clearTimeout(st.clickTimer);
                st.clickTimer = setTimeout(function () {
                    if (st.clickCount === 1) {
                        bounce(idx);
                    } else if (st.clickCount >= 2) {
                        resetModel(idx);
                    }
                    st.clickCount = 0;
                }, 300);
            }

            // ---- 绑定到 a-scene 的 canvas ----
            sceneEl.addEventListener('loaded', function () {
                setTimeout(function () {
                    const canvas = sceneEl.canvas;
                    canvas.addEventListener('mousedown',  handlePointerDown);
                    canvas.addEventListener('mouseup',    handlePointerUp);
                    canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
                    canvas.addEventListener('touchend',   handlePointerUp);
                }, 500);
            });

            // ---- 弹跳 ----
            function bounce(idx) {
                const el = models[idx];
                const st = modelStates[idx];
                if (!el || !st) return;

                clearInterval(st.bounceTimer);
                const orig = {
                    x: st.origScale.x,
                    y: st.origScale.y,
                    z: st.origScale.z
                };

                let step = 0;
                const total = 10;
                const amp = orig.y * 0.4;
                st.bounceTimer = setInterval(function () {
                    if (step >= total) {
                        clearInterval(st.bounceTimer);
                        el.setAttribute('scale', orig);
                        return;
                    }
                    const t = step / total;
                    const dy = Math.sin(t * Math.PI) * amp;
                    el.setAttribute('scale', {
                        x: orig.x + dy,
                        y: orig.y + dy,
                        z: orig.z + dy
                    });
                    step++;
                }, 50);

                if (navigator.vibrate) navigator.vibrate(15);
            }

            // ---- 重置 ----
            function resetModel(idx) {
                const st = modelStates[idx];
                if (!st) return;
                clearInterval(st.bounceTimer);
                st.clickCount = 0;
                models[idx].setAttribute('scale', st.origScale);
                if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
            }

            // ---- 长按信息标签 ----
            function showInfo(idx) {
                const st = modelStates[idx];
                if (!st) return;
                labelEl.textContent = st.info;
                labelEl.classList.add('visible');
                if (navigator.vibrate) navigator.vibrate(30);
                setTimeout(function () {
                    labelEl.classList.remove('visible');
                }, 2000);
            }
        })();
    </script>
</body>
</html>
