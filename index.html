<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ---- 顶部提示 ---- */
        #hint {
            position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.8); font-family: sans-serif; font-size: 11px;
            background: rgba(0,0,0,0.55); padding: 5px 14px; border-radius: 12px;
            z-index: 100; pointer-events: none;
        }

        /* ---- 信息标签 ---- */
        #info-label {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 10px 24px;
            border-radius: 22px; font-family: sans-serif; font-size: 15px;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 100;
        }
        #info-label.visible { opacity: 1; }

        /* ---- 旋转轴工具栏 ---- */
        #toolbar-rot {
            display: flex; gap: 4px; align-items: center;
            padding: 4px 0 6px 0;
        }
        #toolbar-rot .axis-label {
            color: rgba(255,255,255,0.55); font-family: sans-serif;
            font-size: 9px; font-weight: bold; width: 12px; text-align: center;
        }
        .rot-btn {
            width: 28px; height: 28px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.07); color: #fff;
            font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .rot-btn:active { background: rgba(255,255,255,0.3); }

        /* ---- 底部统一工具栏 ---- */
        #toolbar {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; flex-direction: column; align-items: center;
            background: rgba(0,0,0,0.6); padding: 4px 10px 8px 10px; border-radius: 26px;
        }
        #toolbar-func {
            display: flex; gap: 7px; flex-wrap: wrap; justify-content: center;
        }
        #toolbar-func button {
            width: 41px; height: 41px; border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1); color: #fff;
            font-size: 17px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        #toolbar-func button:active { background: rgba(255,255,255,0.3); }
        #toolbar-func button.active { background: rgba(76,175,80,0.5); border-color: #4CAF50; }
        #toolbar-func button.anim-btn { border-color: #ff9800; color: #ff9800; }

        /* ---- 状态指示 ---- */
        #status {
            position: fixed; top: 38px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 10px;
            z-index: 100; pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="hint">☝ 双指旋转Y/缩放 &nbsp;|&nbsp; 按钮控制XYZ轴</div>
    <div id="status"></div>
    <div id="info-label"></div>

    <!-- 底部统一工具栏 -->
    <div id="toolbar">
        <!-- 旋转轴控制 -->
        <div id="toolbar-rot">
            <span class="axis-label">X</span>
            <button class="rot-btn" id="btn-rx-n" title="绕X轴负转">↺</button>
            <button class="rot-btn" id="btn-rx-p" title="绕X轴正转">↻</button>
            <span class="axis-label">Y</span>
            <button class="rot-btn" id="btn-ry-n" title="绕Y轴负转">↺</button>
            <button class="rot-btn" id="btn-ry-p" title="绕Y轴正转">↻</button>
            <span class="axis-label">Z</span>
            <button class="rot-btn" id="btn-rz-n" title="绕Z轴负转">↺</button>
            <button class="rot-btn" id="btn-rz-p" title="绕Z轴正转">↻</button>
        </div>
        <!-- 功能按钮 -->
        <div id="toolbar-func">
            <button id="btn-spin"    title="旋转弹跳">🔄</button>
            <button id="btn-scaleup" title="放大">➕</button>
            <button id="btn-scaledn" title="缩小">➖</button>
            <button id="btn-reset"   title="重置">↺</button>
            <button id="btn-info"    title="信息">ℹ️</button>
            <button id="btn-autorot" title="自动旋转">▶</button>
            <button id="btn-wire"    title="线框模式">🔲</button>
            <button id="btn-anim"    title="播放动画">💀</button>
        </div>
    </div>

    <a-scene
        mindar-image="imageTargetSrc: ./targets.mind;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 图片1 -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="model-0" data-info="📚 图书馆模型"
                src="library.glb" position="0 0 0" rotation="90 0 0"
                scale="0.005 0.005 0.005"></a-gltf-model>
        </a-entity>

        <!-- 图片2 -->
        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model id="model-1" data-info="🗿 绿色头像"
                src="head-green.glb" position="0 0 0"
                scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>

        <!-- 图片3 -->
        <a-entity mindar-image-target="targetIndex: 2">
            <a-gltf-model id="model-2" data-info="📦 盒子模型"
                src="box.glb" position="0 0 0"
                scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>

        <!-- 图片4 -->
        <a-entity mindar-image-target="targetIndex: 3">
            <a-gltf-model id="model-3" data-info="⚽ 球体模型"
                src="ball.glb" position="0 0 0"
                scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>

        <!-- 图片5: 骨骼动画模型 -->
        <a-entity mindar-image-target="targetIndex: 4">
            <a-gltf-model id="model-4" data-info="💀 动画模型"
                src="dying.glb" position="0 0 0"
                scale="0.1 0.1 0.1"
                animation-mixer>
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        (function () {
            const sceneEl = document.querySelector('a-scene');
            const labelEl = document.getElementById('info-label');
            const statusEl = document.getElementById('status');

            const models = {};
            const states = {};   // origScale, origRot, visible, animId, autoRotId
            let activeIdx = -1;
            const MODEL_COUNT = 5;

            // ---- 场景就绪 ----
            sceneEl.addEventListener('loaded', function () {
                for (let i = 0; i < MODEL_COUNT; i++) {
                    const el = document.getElementById('model-' + i);
                    if (!el) continue;
                    models[i] = el;
                    const s = el.getAttribute('scale');
                    const r = el.getAttribute('rotation');
                    states[i] = {
                        info: el.getAttribute('data-info') || ('模型 ' + i),
                        origScale: { x: s.x, y: s.y, z: s.z },
                        origRot:   { x: r.x, y: r.y, z: r.z },
                        visible: false,
                        animId: null,
                        autoRotId: null
                    };
                }

                for (let i = 0; i < MODEL_COUNT; i++) {
                    const t = document.querySelector('[mindar-image-target="targetIndex: ' + i + '"]');
                    if (!t) continue;
                    t.addEventListener('targetFound', function () {
                        states[i].visible = true;
                        activeIdx = i;
                        statusEl.textContent = '📍 识别图 ' + (i + 1) + ' 已追踪';
                    });
                    t.addEventListener('targetLost', function () {
                        states[i].visible = false;
                        if (activeIdx === i) activeIdx = -1;
                        statusEl.textContent = '';
                        labelEl.classList.remove('visible');
                    });
                }
            });

            // ==================== 工具函数 ====================
            function getModel() {
                if (activeIdx < 0) return null;
                return models[activeIdx];
            }
            function getState() {
                if (activeIdx < 0) return null;
                return states[activeIdx];
            }
            function cancelAnim() {
                const st = getState();
                if (st && st.animId) { cancelAnimationFrame(st.animId); st.animId = null; }
            }

            // ==================== 双指旋转(Y轴) & 缩放 ====================
            (function () {
                let initDist = 0, initAngle = 0;
                let initScale = null, initRot = null;
                let gestureActive = false;

                function getDist(e) {
                    const t0 = e.touches[0], t1 = e.touches[1];
                    const dx = t0.clientX - t1.clientX, dy = t0.clientY - t1.clientY;
                    return Math.sqrt(dx * dx + dy * dy);
                }
                function getAngle(e) {
                    const t0 = e.touches[0], t1 = e.touches[1];
                    return Math.atan2(t1.clientY - t0.clientY, t1.clientX - t0.clientX) * 180 / Math.PI;
                }

                function onTouchStart(e) {
                    if (e.touches.length !== 2) return;
                    const model = getModel();
                    if (!model) return;
                    e.preventDefault();
                    cancelAnim();
                    gestureActive = true;
                    initDist = getDist(e);
                    initAngle = getAngle(e);
                    const s = model.getAttribute('scale');
                    const r = model.getAttribute('rotation');
                    initScale = { x: s.x, y: s.y, z: s.z };
                    initRot   = { x: r.x, y: r.y, z: r.z };
                }

                function onTouchMove(e) {
                    if (!gestureActive || e.touches.length !== 2) return;
                    e.preventDefault();
                    const model = getModel();
                    if (!model) return;

                    // 缩放
                    const dist = getDist(e);
                    const ratio = dist / initDist;
                    model.setAttribute('scale', {
                        x: initScale.x * ratio,
                        y: initScale.y * ratio,
                        z: initScale.z * ratio
                    });

                    // Y轴旋转 (保留X和Z不变)
                    const angle = getAngle(e);
                    const deltaAngle = angle - initAngle;
                    model.setAttribute('rotation', {
                        x: initRot.x,
                        y: initRot.y + deltaAngle,
                        z: initRot.z
                    });
                }

                function onTouchEnd(e) {
                    if (e.touches.length < 2) {
                        gestureActive = false;
                        initScale = null;
                        initRot = null;
                    }
                }

                sceneEl.addEventListener('loaded', function () {
                    setTimeout(function () {
                        const c = sceneEl.canvas;
                        c.addEventListener('touchstart', onTouchStart, { passive: false });
                        c.addEventListener('touchmove',  onTouchMove,  { passive: false });
                        c.addEventListener('touchend',   onTouchEnd);
                        c.addEventListener('touchcancel',onTouchEnd);
                    }, 500);
                });
            })();

            // ==================== 鼠标滚轮缩放 (PC) ====================
            sceneEl.addEventListener('loaded', function () {
                setTimeout(function () {
                    sceneEl.canvas.addEventListener('wheel', function (e) {
                        const model = getModel();
                        if (!model) return;
                        e.preventDefault();
                        cancelAnim();
                        const s = model.getAttribute('scale');
                        const factor = e.deltaY > 0 ? 0.9 : 1.1;
                        model.setAttribute('scale', {
                            x: s.x * factor, y: s.y * factor, z: s.z * factor
                        });
                    }, { passive: false });
                }, 500);
            });

            // ==================== 动画: 旋转360°(Y轴) + 弹跳2次 ====================
            function spinBounce() {
                const model = getModel();
                const st = getState();
                if (!model || !st) return;
                cancelAnim();

                const s = model.getAttribute('scale');
                const r = model.getAttribute('rotation');
                const startScale = { x: s.x, y: s.y, z: s.z };
                const startRot = { x: r.x, y: r.y, z: r.z };
                const duration = 1500;
                const bounceCount = 2;
                const bounceAmp = startScale.y * 0.35;
                const startTime = performance.now();

                if (navigator.vibrate) navigator.vibrate(20);

                function step(now) {
                    const elapsed = now - startTime;
                    const t = Math.min(elapsed / duration, 1);
                    const bounce = Math.sin(t * Math.PI * 2 * bounceCount) * bounceAmp * (1 - t);

                    model.setAttribute('rotation', {
                        x: startRot.x + t * 360,   // X轴也转360° 
                        y: startRot.y + t * 360,
                        z: startRot.z
                    });
                    model.setAttribute('scale', {
                        x: startScale.x + bounce,
                        y: startScale.y + bounce,
                        z: startScale.z + bounce
                    });

                    if (t < 1) {
                        st.animId = requestAnimationFrame(step);
                    } else {
                        model.setAttribute('scale', startScale);
                        model.setAttribute('rotation', {
                            x: startRot.x + 360,
                            y: startRot.y + 360,
                            z: startRot.z
                        });
                        st.animId = null;
                        if (navigator.vibrate) navigator.vibrate(15);
                    }
                }
                st.animId = requestAnimationFrame(step);
            }

            // ==================== 缩放步进 ====================
            function scaleStep(factor) {
                const model = getModel();
                if (!model) return;
                cancelAnim();
                const s = model.getAttribute('scale');
                model.setAttribute('scale', {
                    x: s.x * factor, y: s.y * factor, z: s.z * factor
                });
                if (navigator.vibrate) navigator.vibrate(10);
            }

            // ==================== 重置 ====================
            function resetModel() {
                const model = getModel();
                const st = getState();
                if (!model || !st) return;
                cancelAnim();
                if (st.autoRotId) { cancelAnimationFrame(st.autoRotId); st.autoRotId = null; }
                model.setAttribute('scale', st.origScale);
                model.setAttribute('rotation', st.origRot);
                document.getElementById('btn-autorot').classList.remove('active');
                document.getElementById('btn-wire').classList.remove('active');
                document.getElementById('btn-anim').classList.remove('active');
                if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
            }

            // ==================== 信息 ====================
            function showInfo() {
                const st = getState();
                if (!st) return;
                labelEl.textContent = st.info;
                labelEl.classList.add('visible');
                if (navigator.vibrate) navigator.vibrate(25);
                clearTimeout(st._infoTimer);
                st._infoTimer = setTimeout(function () {
                    labelEl.classList.remove('visible');
                }, 2000);
            }

            // ==================== 自动旋转 ====================
            function toggleAutoRot() {
                const model = getModel();
                const st = getState();
                if (!model || !st) return;
                const btn = document.getElementById('btn-autorot');

                if (st.autoRotId) {
                    cancelAnimationFrame(st.autoRotId);
                    st.autoRotId = null;
                    btn.classList.remove('active');
                    return;
                }

                btn.classList.add('active');
                cancelAnim();
                function rotate() {
                    const r = model.getAttribute('rotation');
                    model.setAttribute('rotation', {
                        x: r.x + 0.3,
                        y: r.y + 0.6,
                        z: r.z + 0.2
                    });
                    st.autoRotId = requestAnimationFrame(rotate);
                }
                st.autoRotId = requestAnimationFrame(rotate);
            }

            // ==================== XYZ 轴旋转 (30°步进) ====================
            function rotateAxis(axis, deg) {
                const model = getModel();
                if (!model) return;
                cancelAnim();
                const r = model.getAttribute('rotation');
                const rot = { x: r.x, y: r.y, z: r.z };
                rot[axis] += deg;
                model.setAttribute('rotation', rot);
                if (navigator.vibrate) navigator.vibrate(10);
            }

            // ==================== 播放骨骼动画 ====================
            function playAnim() {
                const model = getModel();
                if (!model) return;
                // animation-mixer 组件: 重新开始播放
                var mixer = model.components['animation-mixer'];
                if (mixer) {
                    mixer.stopAction();
                    mixer.playAction();
                    if (navigator.vibrate) navigator.vibrate(20);
                }
            }

            // ==================== 线框模式 ====================
            function toggleWireframe() {
                const model = getModel();
                const st = getState();
                if (!model || !st) return;
                const btn = document.getElementById('btn-wire');

                // 遍历模型的 mesh 子节点
                model.object3D.traverse(function (node) {
                    if (node.isMesh && node.material) {
                        if (Array.isArray(node.material)) {
                            node.material.forEach(function (m) {
                                m.wireframe = !m.wireframe;
                            });
                        } else {
                            node.material.wireframe = !node.material.wireframe;
                        }
                    }
                });

                if (!st._wireframe) {
                    st._wireframe = true;
                    btn.classList.add('active');
                } else {
                    st._wireframe = false;
                    btn.classList.remove('active');
                }
                if (navigator.vibrate) navigator.vibrate(10);
            }

            // ==================== UI 按钮绑定 ====================
            function bind(id, handler) {
                var el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('click', handler);
                el.addEventListener('touchend', function (e) { e.preventDefault(); handler(); });
            }

            // XYZ 旋转
            bind('btn-rx-n', function () { rotateAxis('x', -30); });
            bind('btn-rx-p', function () { rotateAxis('x',  30); });
            bind('btn-ry-n', function () { rotateAxis('y', -30); });
            bind('btn-ry-p', function () { rotateAxis('y',  30); });
            bind('btn-rz-n', function () { rotateAxis('z', -30); });
            bind('btn-rz-p', function () { rotateAxis('z',  30); });

            // 功能按钮
            bind('btn-spin',    spinBounce);
            bind('btn-scaleup', function () { scaleStep(1.2); });
            bind('btn-scaledn', function () { scaleStep(0.8); });
            bind('btn-reset',   resetModel);
            bind('btn-info',    showInfo);
            bind('btn-autorot', toggleAutoRot);
            bind('btn-wire',    toggleWireframe);
            bind('btn-anim',    playAnim);
        })();
    </script>
</body>
</html>
