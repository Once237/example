<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        #info-label {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            font-family: sans-serif;
            font-size: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        #info-label.visible { opacity: 1; }

        #hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-family: sans-serif;
            font-size: 13px;
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 15px;
            z-index: 100;
        }
    </style>
</head>

<body>
    <div id="hint">👆 点击弹跳 | 👆👆 双击重置 | 📌 长按看信息</div>
    <div id="info-label"></div>

    <a-scene
        mindar-image="imageTargetSrc: ./targets.mind;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <!-- 摄像头 + 屏幕点击射线 -->
        <a-camera
            position="0 0 0"
            look-controls="enabled: false"
            cursor="fuse: false; rayOrigin: mouse"
            raycaster="objects: .clickable; far: 100">
        </a-camera>

        <!-- 图片1 -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model
                class="clickable"
                id="model-0"
                src="library.glb"
                position="0 0 0"
                rotation="90 0 0"
                scale="0.005 0.005 0.005"
                model-interact="info: 📚 图书馆模型">
            </a-gltf-model>
        </a-entity>

        <!-- 图片2 -->
        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model
                class="clickable"
                id="model-1"
                src="head-green.glb"
                position="0 0 0"
                scale="0.1 0.1 0.1"
                model-interact="info: 🗿 绿色头像">
            </a-gltf-model>
        </a-entity>

        <!-- 图片3 -->
        <a-entity mindar-image-target="targetIndex: 2">
            <a-gltf-model
                class="clickable"
                id="model-2"
                src="box.glb"
                position="0 0 0"
                scale="0.1 0.1 0.1"
                model-interact="info: 📦 盒子模型">
            </a-gltf-model>
        </a-entity>

        <!-- 图片4 -->
        <a-entity mindar-image-target="targetIndex: 3">
            <a-gltf-model
                class="clickable"
                id="model-3"
                src="ball.glb"
                position="0 0 0"
                scale="0.1 0.1 0.1"
                model-interact="info: ⚽ 球体模型">
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        AFRAME.registerComponent('model-interact', {
            schema: {
                info: { type: 'string', default: '' }
            },

            init: function () {
                const el = this.el;
                const self = this;

                this.clickCount = 0;
                this.clickTimer = null;
                this.longPressTimer = null;
                this.isVisible = false;

                // ---- 追踪目标出现/消失 ----
                el.addEventListener('targetFound', () => { self.isVisible = true; });
                el.addEventListener('targetLost', () => {
                    self.isVisible = false;
                    self.hideInfo();
                });

                // ---- 光标悬停高亮 ----
                el.addEventListener('mouseenter', () => {
                    if (!self.isVisible) return;
                    el.setAttribute('scale', {
                        x: parseFloat(el.getAttribute('scale').x) * 1.1,
                        y: parseFloat(el.getAttribute('scale').y) * 1.1,
                        z: parseFloat(el.getAttribute('scale').z) * 1.1
                    });
                });
                el.addEventListener('mouseleave', () => {
                    if (!self.isVisible) return;
                    el.setAttribute('scale', {
                        x: parseFloat(el.getAttribute('scale').x) / 1.1,
                        y: parseFloat(el.getAttribute('scale').y) / 1.1,
                        z: parseFloat(el.getAttribute('scale').z) / 1.1
                    });
                });

                // ---- 点击: 弹跳动画 ----
                el.addEventListener('click', (e) => {
                    if (!self.isVisible) return;
                    self.clickCount++;
                    clearTimeout(self.clickTimer);
                    self.clickTimer = setTimeout(() => {
                        if (self.clickCount === 1) {
                            self.bounce();           // 单击 → 弹跳
                        } else if (self.clickCount >= 2) {
                            self.resetModel();       // 双击 → 重置
                        }
                        self.clickCount = 0;
                    }, 300);
                });

                // ---- 长按: 显示信息 (PC鼠标版) ----
                el.addEventListener('mousedown', () => {
                    if (!self.isVisible) return;
                    self.longPressTimer = setTimeout(() => self.showInfo(), 800);
                });
                el.addEventListener('mouseup',   () => clearTimeout(self.longPressTimer));
                el.addEventListener('mouseleave',() => { clearTimeout(self.longPressTimer); self.hideInfo(); });

                // ---- 长按: 显示信息 (移动端触摸版) ----
                el.addEventListener('touchstart', () => {
                    if (!self.isVisible) return;
                    self.longPressTimer = setTimeout(() => self.showInfo(), 800);
                });
                el.addEventListener('touchend', () => {
                    clearTimeout(self.longPressTimer);
                    self.hideInfo();
                });
            },

            // 弹跳效果
            bounce: function () {
                const el = this.el;
                const s = el.getAttribute('scale');
                const orig = { x: s.x, y: s.y, z: s.z };

                // 保存原始缩放
                if (!this._origScale) this._origScale = orig;

                let step = 0;
                const total = 10;
                const height = 0.3;
                const timer = setInterval(() => {
                    if (step >= total) {
                        clearInterval(timer);
                        el.setAttribute('scale', orig);
                        return;
                    }
                    const t = step / total;
                    const bounceY = Math.sin(t * Math.PI) * height;
                    el.setAttribute('scale', {
                        x: orig.x + bounceY,
                        y: orig.y + bounceY,
                        z: orig.z + bounceY
                    });
                    step++;
                }, 50);

                if (navigator.vibrate) navigator.vibrate(15);
            },

            // 重置模型到初始状态
            resetModel: function () {
                if (this._origScale) {
                    this.el.setAttribute('scale', this._origScale);
                }
                if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
            },

            // 信息标签
            showInfo: function () {
                const label = document.getElementById('info-label');
                label.textContent = this.data.info;
                label.classList.add('visible');
                if (navigator.vibrate) navigator.vibrate(30);
                setTimeout(() => this.hideInfo(), 2000);
            },

            hideInfo: function () {
                document.getElementById('info-label').classList.remove('visible');
            }
        });
    </script>
</body>
</html>
